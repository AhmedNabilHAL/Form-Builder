spring.application.name=form-builder-api

server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/form_builder}

logging.level.root=INFO
logging.level.com.aiagentictask.form_builder_api=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=false
app.cors.max-age=3600

app.security.enable-hsts=false
app.security.content-security-policy=default-src 'self'
app.security.referrer-policy=strict-origin-when-cross-origin
logging.level.root=INFO
logging.level.com.aiagentictask.form_builder_api=INFO

app.cors.allowed-origins=https://your-frontend-domain.com
app.cors.allow-credentials=true

app.security.enable-hsts=true
app.security.content-security-policy=default-src 'self'; frame-ancestors 'none'
app.security.referrer-policy=strict-origin-when-cross-origin
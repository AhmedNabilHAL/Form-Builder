server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI}

logging.level.root=INFO
logging.level.com.aiagentictask.form_builder_api=INFO

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

app.upload.dir=${APP_UPLOAD_DIR:/tmp/uploads}

app.security.enable-hsts=true
app.security.content-security-policy=default-src 'self'; frame-ancestors 'none'
app.security.referrer-policy=strict-origin-when-cross-origin